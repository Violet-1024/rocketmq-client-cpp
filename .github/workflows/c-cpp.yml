name: Build RocketMQ ARM64 DEB

on:
  push:
    branches: [ "release-2.0.0" ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    # 1. 获取代码
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: release-2.0.0
        submodules: true

    # 2. 开启 QEMU 模拟
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    # 3. 编译与打包
    - name: Build in Docker
      run: |
        # 使用 arm64v8/ubuntu 镜像
        docker run --rm -t \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/src \
          -w /src \
          arm64v8/ubuntu:22.04 \
          /bin/bash -c "
            # --- 1. 安装依赖 ---
            apt-get update && apt-get install -y \
              cmake \
              make \
              g++ \
              libssl-dev \
              libcurl4-openssl-dev \
              zlib1g-dev \
              wget \
              dpkg-dev \
              debhelper \
              fakeroot \
            && rm -rf /var/lib/apt/lists/*

            # --- 2. 编译 ---
            cd /src
            mkdir -p build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release
            make -j$(nproc)

            # --- 3. 修复并打包 (关键修改在这里) ---
            # 我们添加 -D CPACK_DEBIAN_PACKAGE_PREINSTALL_SCRIPT=/dev/null 来跳过那个报错的脚本
            cpack -G DEB -D CPACK_DEBIAN_PACKAGE_PREINSTALL_SCRIPT=/dev/null
          "

    # 4. 上传构件
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rocketmq-client-cpp-deb
        path: |
          *.deb
          build/*.deb

name: Build RocketMQ ARM64 DEB

on:
  push:
    branches: [ "release-2.0.0" ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    # ==========================================
    # 1. 获取代码
    # ==========================================
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: release-2.0.0
        submodules: true

    # ==========================================
    # 2. 开启 QEMU 模拟 ARM64
    # ==========================================
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    # ==========================================
    # 3. 编译与打包 (手动安装旧版 Boost 1.58.0)
    # ==========================================
    - name: Build and Package
      run: |
        cat << 'EOF' > build.sh
        #!/bin/bash
        set -e

        echo "=== 1. 更新源并安装基础依赖 ==="
        apt-get update
        # 注意：这里不再安装 libboost-all-dev，我们将手动安装旧版
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
            cmake \
            make \
            g++ \
            gcc \
            libssl-dev \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libjansson-dev \
            uuid-dev \
            pkg-config \
            wget \
            git \
            dpkg-dev \
            cpio \
            rpm \
            libevent-dev \
            libjsoncpp-dev \
            libapr1-dev \
            libaprutil1-dev \
            liblog4cxx-dev \
            python3 \
            bzip2

        echo "=== 2. 手动下载并编译安装旧版 Boost 1.58.0 ==="
        cd /tmp
        wget https://sourceforge.net/projects/boost/files/boost/1.58.0/boost_1_58_0.tar.gz
        tar -xzf boost_1_58_0.tar.gz
        cd boost_1_58_0
        # 配置并编译安装 Boost (这一步在 ARM64 模拟环境下可能需要几分钟)
        ./bootstrap.sh --prefix=/usr
        ./b2 install --with=all -j2
        
        # 清理临时文件
        cd /tmp && rm -rf boost_1_58_0.tar.gz boost_1_58_0
        cd /src

        echo "=== 3. 修复 JsonCpp 头文件路径 ==="
        ln -sf /usr/include/jsoncpp/json /usr/include/json

        echo "=== 4. 修复源码中的 -m64 参数 (解决 ARM 编译报错) ==="
        find . -name "CMakeLists.txt" -exec sed -i 's/-m64//g' {} +
        sed -i 's/set(CMAKE_SIZEOF_VOID_P 8)/# set(CMAKE_SIZEOF_VOID_P 8)/g' CMakeLists.txt

        echo "=== 5. 修复脚本执行权限 ==="
        chmod +x /src/scripts/*.sh || true
        chmod +x /src/cmake/*.sh || true

        echo "=== 6. 运行 CMake 配置 ==="
        mkdir -p build
        cd build
        # 使用旧版 Boost 后，不再需要那些复杂的兼容性宏定义了
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DBUILD_SHARED_LIBS=ON

        echo "=== 7. 开始编译 (限制线程防止内存溢出) ==="
        make -j2

        echo "=== 8. 生成 DEB 包 (跳过 preinstall 报错) ==="
        cpack -G DEB \
          -D CPACK_DEBIAN_PACKAGE_PREINSTALL_SCRIPT=/dev/null \
          -D CPACK_DEBIAN_PACKAGE_POSTINSTALL_SCRIPT=/dev/null

        echo "=== 9. 准备产出物 ==="
        cp *.deb /src/
        EOF

        chmod +x build.sh

        docker run --rm -t \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/src \
          -w /src \
          arm64v8/ubuntu:22.04 \
          /bin/bash /src/build.sh

    # ==========================================
    # 4. 上传产物
    # ==========================================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rocketmq-client-cpp-arm64
        path: "*.deb"

name: Build RocketMQ Client CPP (ARM64)

on:
  workflow_dispatch: # 允许手动触发
  push:
    branches: [ release-2.0.0 ]

jobs:
  build-arm64-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and Package in ARM64 Container
        run: |
          mkdir -p output

          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ github.workspace }}/output:/output \
            ubuntu:22.04 bash -c '
              set -e
              echo "=== 1. Install System Dependencies ==="
              apt-get update && apt-get install -y \
                wget build-essential cmake autoconf automake libtool \
                zlib1g-dev libbz2-dev perl pkg-config

              cd /workspace

              echo "=== 2. Patch Source Code (The Magic Happens Here) ==="
              # --- 修改 build.sh ---
              # 将 Boost 版本升级为 1.72.0
              sed -i "s/BOOST_VERSION=\"1_58_0\"/BOOST_VERSION=\"1_72_0\"/g" build.sh
              # 更新下载链接 (SourceForge 自动跳转链接)
              sed -i "s|projects/boost/files/boost/1.58.0/|projects/boost/files/boost/1.72.0/|g" build.sh
              sed -i "s|boost_1_58_0.tar.gz|boost_1_72_0.tar.gz|g" build.sh

              # --- 修改 CMakeLists.txt ---
              # 去除 -m64 参数，防止 ARM64 编译报错
              sed -i "/-m64/s/^/#/" CMakeLists.txt

              echo "=== 3. Run Build Script ==="
              # 执行修改后的脚本，它会自动下载新版 Boost 并编译
              sh build.sh all

              echo "=== 4. Create DEB Package ==="
              # 进入构建目录打包
              cd output
              # 假设 build.sh 把产物放在了当前目录的 output 文件夹，或者你需要根据实际路径调整
              # 这里模拟 cpack 打包过程 (如果 build.sh 没自带打包功能)
              # 注意：rocketmq-client-cpp 原生可能不带 cpack，需要自己写简单的 deb 控制文件
              # 为了演示，这里假设我们只提取 .so 文件
              mkdir -p /tmp/deb/usr/lib
              cp lib/librocketmq.so /tmp/deb/usr/lib/

              # 创建简单的 control 文件
              mkdir -p /tmp/deb/DEBIAN
              cat > /tmp/deb/DEBIAN/control <<EOF
              Package: rocketmq-client-cpp
              Version: 2.0.0-arm64
              Architecture: arm64
              Maintainer: CI Bot
              Description: RocketMQ C++ Client Library
              EOF

              dpkg-deb --build /tmp/deb /output/rocketmq-client-cpp-2.0.0-arm64.deb
            '

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocketmq-client-cpp-arm64-deb
          path: output/*.deb

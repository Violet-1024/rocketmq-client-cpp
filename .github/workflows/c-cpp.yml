name: Build RocketMQ ARM64 DEB

on:
  push:
    branches: [ "release-2.0.0" ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    # ==========================================
    # 1. 获取代码
    # ==========================================
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: release-2.0.0
        submodules: true

    # ==========================================
    # 2. 开启 QEMU 模拟 ARM64
    # ==========================================
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    # ==========================================
    # 3. 编译与打包 (修复了依赖安装部分)
    # ==========================================
    - name: Build and Package
      uses: addnab/docker-run-action@v3
      with:
        image: arm64v8/ubuntu:22.04
        options: |
          --platform linux/arm64
          -v ${{ github.workspace }}:/src
          -w /src
        run: |
          # --- 修复重点：正确的包名和工具链 ---
          echo "🚀 开始安装依赖..."
          apt-get update

          # 安装编译工具链和打包工具
          # 注意：cpack 包含在 cmake 包中，不需要单独安装 cpck
          # build-essential 包含了 make, gcc, g++ 等基础工具
          apt-get install -y \
              cmake \
              make \
              g++ \
              gcc \
              libssl-dev \
              zlib1g-dev \
              libcurl4-openssl-dev \
              libapr1-dev \
              libaprutil1-dev \
              uuid-dev \
              libjsoncpp-dev \
              pkg-config \
              wget \
              git

          echo "✅ 依赖安装完成"

          # --- 编译步骤 ---
          echo "🔨 开始编译..."
          mkdir -p build
          cd build

          # 开启打包选项
          cmake .. -DUSE_OPENSSL=ON -DBUILD_STATIC_LIBS=OFF -DBUILD_SHARED_LIBS=ON -DCPACK_GENERATOR="DEB"

          # 编译 (使用所有核心加速)
          make -j$(nproc)

          echo "✅ 编译完成"

          # --- 打包步骤 ---
          echo "📦 开始打包 DEB..."
          # 执行打包
          cpack -G DEB

          # 检查生成的包
          ls -la *.deb

          echo "✅ 打包完成"

    # ==========================================
    # 4. 上传产物
    # ==========================================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rocketmq-client-cpp-deb
        path: |
          ${{ github.workspace }}/build/*.deb

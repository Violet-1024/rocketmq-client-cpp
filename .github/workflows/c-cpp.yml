name: Build RocketMQ ARM64 DEB-2.0.0

on:
  push:
    branches: [ "release-2.0.0" ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    # ==========================================
    # 1. 获取代码
    # ==========================================
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: release-2.0.0
        submodules: true # 必须：RocketMQ 包含子模块

    # ==========================================
    # 2. 修复报错的关键步骤：开启 QEMU 模拟
    # ==========================================
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    # ==========================================
    # 3. 编译与打包 (在 ARM64 环境中运行)
    # ==========================================
    - name: Build and Package in ARM64 Container
      uses: addnab/docker-run-action@v3
      with:
        # 指定平台为 arm64，解决 "no matching manifest" 报错
        options: |
          --platform linux/arm64
          -v ${{ github.workspace }}:/src
          -w /src
        image: arm64v8/ubuntu:22.04
        run: |
          # --- 容器内执行的脚本开始 ---
          
          # 1. 更新源并安装依赖 (编译工具 + RocketMQ 依赖 + CPack 打包工具)
          echo "Installing dependencies..."
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git cmake make g++ gcc \
            libssl-dev libcurl4-openssl-dev \
            libjsoncpp-dev libpulse-dev \
            zlib1g-dev \
            cpack # CPack 工具用于生成 deb 包

          # 2. 编译源码
          echo "Building RocketMQ Client..."
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

          # 3. 生成 DEB 包
          echo "Packaging DEB..."
          # cpack 会自动读取 CMakeLists.txt 中的配置生成 .deb 文件
          cpack -G DEB

          # 4. 整理产物 (把生成的包复制到源码根目录，方便 GitHub 抓取)
          echo "Copying artifact..."
          cp *.deb /src/rocketmq-client-cpp-2.0.0-Linux-arm64.deb
          
          # --- 容器内执行的脚本结束 ---

    # ==========================================
    # 4. 上传产物
    # ==========================================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rocketmq-client-cpp-2.0.0-arm64
        path: rocketmq-client-cpp-2.0.0-Linux-arm64.deb

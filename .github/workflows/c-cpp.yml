name: Build RocketMQ ARM64 DEB

on:
  push:
    branches: [ "release-2.0.0" ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    # ==========================================
    # 1. 获取代码
    # ==========================================
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: release-2.0.0
        submodules: true

    # ==========================================
    # 2. 开启 QEMU 模拟 ARM64
    # ==========================================
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    # ==========================================
    # 3. 编译与打包 (终极修复 Boost 版本不兼容)
    # ==========================================
    - name: Build and Package
      run: |
        cat << 'EOF' > build.sh
        #!/bin/bash
        set -e

        echo "=== 1. 更新源并安装所有依赖 ==="
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
            cmake \
            make \
            g++ \
            gcc \
            libssl-dev \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libjansson-dev \
            uuid-dev \
            pkg-config \
            wget \
            git \
            dpkg-dev \
            cpio \
            rpm \
            libboost-all-dev \
            libevent-dev \
            libjsoncpp-dev \
            libapr1-dev \
            libaprutil1-dev \
            liblog4cxx-dev

        echo "=== 2. 修复 JsonCpp 头文件路径 ==="
        ln -sf /usr/include/jsoncpp/json /usr/include/json

        echo "=== 3. 修复源码中的 -m64 参数 (解决 ARM 编译报错) ==="
        find . -name "CMakeLists.txt" -exec sed -i 's/-m64//g' {} +
        sed -i 's/set(CMAKE_SIZEOF_VOID_P 8)/# set(CMAKE_SIZEOF_VOID_P 8)/g' CMakeLists.txt

        echo "=== 4. 终极修复 Boost 版本不兼容问题 ==="
        # 创建软链接，让旧版路径 boost/detail 直接指向新版路径 boost/endian
        # 这样无论源码里包含的是旧版还是新版头文件，都能顺利找到
        ln -sf /usr/include/boost/endian /usr/include/boost/detail
        
        # 按照新版 Boost 的要求，定义宏来启用废弃的接口
        export CXXFLAGS="-DBOOST_ENDIAN_DEPRECATED_NAMES"

        echo "=== 5. 修复脚本执行权限 ==="
        chmod +x /src/scripts/*.sh || true
        chmod +x /src/cmake/*.sh || true

        echo "=== 6. 运行 CMake 配置 ==="
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DBUILD_SHARED_LIBS=ON \
          -DCMAKE_CXX_FLAGS="-DBOOST_ENDIAN_DEPRECATED_NAMES"

        echo "=== 7. 开始编译 (限制线程防止内存溢出) ==="
        make -j2

        echo "=== 8. 生成 DEB 包 (跳过 preinstall 报错) ==="
        cpack -G DEB \
          -D CPACK_DEBIAN_PACKAGE_PREINSTALL_SCRIPT=/dev/null \
          -D CPACK_DEBIAN_PACKAGE_POSTINSTALL_SCRIPT=/dev/null

        echo "=== 9. 准备产出物 ==="
        cp *.deb /src/
        EOF

        chmod +x build.sh

        docker run --rm -t \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/src \
          -w /src \
          arm64v8/ubuntu:22.04 \
          /bin/bash /src/build.sh

    # ==========================================
    # 4. 上传产物
    # ==========================================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rocketmq-client-cpp-arm64
        path: "*.deb"

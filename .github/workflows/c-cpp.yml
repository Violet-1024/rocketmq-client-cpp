name: Build RocketMQ ARM64 DEB

on:
  push:
    branches: [ "release-2.0.0" ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    # ==========================================
    # 1. 获取代码
    # ==========================================
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: release-2.0.0
        submodules: true

    # ==========================================
    # 2. 开启 QEMU 模拟 ARM64
    # ==========================================
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    # ==========================================
    # 3. 编译与打包 (终极依赖补全 + 路径修复)
    # ==========================================
    - name: Build and Package
      run: |
        cat << 'EOF' > build.sh
        #!/bin/bash
        set -e

        echo "=== 1. 更新源并安装所有依赖 ==="
        apt-get update
        # 补全了 RocketMQ 编译所需的全套依赖（包括 zlib）
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
            cmake \
            make \
            g++ \
            gcc \
            libssl-dev \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libjansson-dev \
            uuid-dev \
            pkg-config \
            wget \
            git \
            dpkg-dev \
            cpio \
            rpm \
            libboost-all-dev \
            libevent-dev \
            libjsoncpp-dev \
            libapr1-dev \
            libaprutil1-dev \
            liblog4cxx-dev

        echo "=== 2. 修复 JsonCpp 头文件路径 (解决 json/json.h 找不到的问题) ==="
        # 创建软链接，让编译器能通过 #include "json/json.h" 找到系统里的 JsonCpp 头文件
        ln -sf /usr/include/jsoncpp/json /usr/include/json

        echo "=== 3. 修复源码中的 -m64 参数 (解决 ARM 编译报错) ==="
        # 全局搜索 CMakeLists.txt 并删除不兼容的 -m64 参数
        find . -name "CMakeLists.txt" -exec sed -i 's/-m64//g' {} +
        # 移除可能导致冲突的硬编码指针大小设置
        sed -i 's/set(CMAKE_SIZEOF_VOID_P 8)/# set(CMAKE_SIZEOF_VOID_P 8)/g' CMakeLists.txt

        echo "=== 4. 修复脚本执行权限 ==="
        chmod +x /src/scripts/*.sh || true
        chmod +x /src/cmake/*.sh || true

        echo "=== 5. 运行 CMake 配置 ==="
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DBUILD_SHARED_LIBS=ON \
          -DCMAKE_CXX_FLAGS="-include boost/endian/endian.hpp"

        echo "=== 6. 开始编译 (限制线程防止内存溢出) ==="
        # 使用 -j2 限制并发，防止 GitHub Actions 虚拟机内存爆满导致 Error 2
        make -j2

        echo "=== 7. 生成 DEB 包 (终极修复 preinstall 报错) ==="
        # 强制禁用 preinstall 和 postinstall 脚本，彻底解决 CPack 打包阶段的权限报错
        cpack -G DEB \
          -D CPACK_DEBIAN_PACKAGE_PREINSTALL_SCRIPT=/dev/null \
          -D CPACK_DEBIAN_PACKAGE_POSTINSTALL_SCRIPT=/dev/null

        echo "=== 8. 准备产出物 ==="
        # 将生成的 deb 包复制到挂载的根目录，方便 GitHub 抓取
        cp *.deb /src/
        EOF

        # 赋予脚本执行权限
        chmod +x build.sh

        # 在 ARM64 Ubuntu 22.04 容器中运行上述脚本
        docker run --rm -t \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/src \
          -w /src \
          arm64v8/ubuntu:22.04 \
          /bin/bash /src/build.sh

    # ==========================================
    # 4. 上传产物
    # ==========================================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rocketmq-client-cpp-arm64
        path: "*.deb"

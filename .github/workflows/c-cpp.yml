name: Build RocketMQ ARM64 DEB

on:
  push:
    branches: [ "release-2.0.0" ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    # ==========================================
    # 1. 获取代码
    # ==========================================
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: release-2.0.0
        submodules: true

    # ==========================================
    # 2. 开启 QEMU 模拟 ARM64
    # ==========================================
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    # ==========================================
    # 3. 编译与打包 (修复内存溢出)
    # ==========================================
    - name: Build in Docker
      run: |
        docker run --rm -t \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/src \
          -w /src/build \
          arm64v8/ubuntu:22.04 \
          /bin/bash -c "
            set -e

            echo '=== 1. 安装依赖 ==='
            apt-get update
            # 安装编译工具和库，注意这里不再尝试安装不存在的cpack包
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
                cmake make g++ gcc libssl-dev libcurl4-openssl-dev \
                zlib1g-dev libjansson-dev uuid-dev pkg-config

            echo '=== 2. 修复权限 ==='
            chmod +x /src/scripts/*.sh || true

            echo '=== 3. 生成 Makefile ==='
            # 这里使用默认配置，如果有特殊CMAKE参数可以在这里加
            cmake ..

            echo '=== 4. 开始编译 (限制线程防止内存溢出) ==='
            # 关键修复：使用 -j2 限制并发，防止 GitHub Actions 内存溢出
            make -j2

            echo '=== 5. 生成 DEB 包 ==='
            # 直接运行 cpack，不再带错误的预安装参数
            cpack -G DEB
          "

    # ==========================================
    # 4. 上传产物
    # ==========================================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rocketmq-client-cpp-deb
        path: |
          ${{ github.workspace }}/build/*.deb
          ${{ github.workspace }}/build/*.rpm
